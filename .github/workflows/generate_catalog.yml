name: Generate Release Catalog

on:
  workflow_dispatch:
  repository_dispatch:
    types: [release-metadata-updated]
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-catalog
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Releases Repo
        uses: actions/checkout@v4

      - name: Checkout Interaction Contracts
        uses: actions/checkout@v4
        with:
          repository: 50gramx/eapp-interaction-contracts
          token: ${{ secrets.PROTOBUF_TOKEN || github.token }}
          path: .ci/eapp-interaction-contracts

      - name: Generate Catalog
        run: |
          node tools/generate-catalog.mjs \
            --contracts-root .ci/eapp-interaction-contracts \
            --metadata-root data/releases \
            --github-releases-repo ${{ github.repository }} \
            --github-token ${{ github.token }} \
            --output data/catalog.json

      - name: Commit Catalog
        run: |
          if git diff --quiet -- data/catalog.json; then
            echo "Catalog is already current."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/catalog.json
            git commit -m "Update release catalog"
            # Conflict-safe: several scheduled workflows push this branch, so a
            # bare push races. Rebase onto latest and retry; give up gracefully.
            for i in $(seq 1 6); do
              git pull --rebase --autostash -q origin main || git rebase --abort || true
              if git push -q origin HEAD:main; then echo "pushed"; exit 0; fi
              echo "push raced (attempt $i) — retrying"; sleep $((RANDOM % 4 + 2))
            done
            echo "gave up after retries (not a failure)"; exit 0
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Static Site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Catalog Site
        id: deployment
        uses: actions/deploy-pages@v4
