name: Aggregate founder nodes

# Builds data/founders.json from data/nodes/*.json. founders.json is a fully
# derived artifact, so the commit step syncs to origin and REGENERATES before
# each push attempt — this makes concurrent runs conflict-free (no rebase of a
# stale generated file, which was the old failure mode).
on:
  schedule:
    - cron: '9,24,39,54 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['data/nodes/**']

permissions:
  contents: write

concurrency:
  group: aggregate-founders
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate + push (retry, conflict-free)
        # SITE_DISPATCH_TOKEN is a PAT with `contents: write` on the brand-site
        # repo. GITHUB_TOKEN cannot reach another repository. When it is unset the
        # dispatch is skipped and says so — the site's nightly cron still catches
        # up, so a missing secret degrades freshness rather than breaking the run.
        env:
          SITE_DISPATCH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
        run: |
          git config user.name "eutopia-ci"
          git config user.email "ci@50gramx.com"
          for i in $(seq 1 6); do
            git fetch -q origin main
            git reset -q --hard origin/main
            node tools/aggregate-founders.mjs
            # Stage first, then ask whether anything changed. data/communities.json
            # did not exist in the tree, and `git diff` on an untracked path reports
            # no difference — so the old guard exited "no change" and the file the
            # aggregator had just written was thrown away on every run, for as long
            # as buildCommunities() has existed. --cached sees adds as well as edits.
            git add data/founders.json data/network.json data/bests.json data/mesh.json data/communities.json
            if git diff --cached --quiet; then
              echo "no change"; exit 0
            fi
            git commit -q -m "ci: aggregate founder nodes + network/bests/communities proof"
            if git push -q origin HEAD:main; then
              echo "pushed"
              # The brand site is a static export: its region pages are baked at
              # build time, and a new mohalla is a new ROUTE that only a build can
              # create. Publishing the aggregate is therefore only half the job —
              # tell the site to rebuild. Best-effort: a lost dispatch costs a few
              # hours of staleness, and the site's nightly cron catches it.
              if [ -n "${SITE_DISPATCH_TOKEN:-}" ]; then
                code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
                  -H 'Accept: application/vnd.github+json' \
                  -H "Authorization: Bearer $SITE_DISPATCH_TOKEN" \
                  https://api.github.com/repos/50gramx/eapp-nextjs-implementation-firebase/dispatches \
                  -d '{"event_type":"aggregate-published"}' || echo 000)
                echo "site rebuild dispatch -> $code"
              else
                echo "SITE_DISPATCH_TOKEN unset — site will refresh on its nightly cron"
              fi
              exit 0
            fi
            echo "push raced (attempt $i) — re-syncing"; sleep $((RANDOM % 4 + 2))
          done
          echo "gave up after retries — next run will catch up (not a failure)"; exit 0
