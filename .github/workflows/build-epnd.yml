name: Build epnd (free public CI)

# Mirrors private epn-daemon/.github/workflows/release.yml exactly, but runs
# here so it's free. Private repo is untouched — we just poll its latest
# `main` SHA (via CI_READ_TOKEN, read-only) and only rebuild when it moves.
# A marker commit SHA is kept in `epnd-last-built.txt` on this repo's main.
on:
  schedule:
    # Offset off the :00/:15/:30/:45 marks — those are the most congested
    # minutes across all of GitHub's scheduled-workflow queue (shared by
    # every repo on the platform) and schedules there are frequently delayed
    # or dropped entirely (documented GitHub Actions behavior). 7/22/37/52
    # still gives a ~15-min cadence without competing for that exact slot.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # to dispatch app rebuilds after a successful epnd publish

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.latest.outputs.sha }}
      should_build: ${{ steps.compare.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4

      - name: Get latest epn-daemon main SHA
        id: latest
        env:
          GH_TOKEN: ${{ secrets.CI_READ_TOKEN }}
        run: |
          sha=$(gh api repos/50gramx/epn-daemon/commits/main --jq .sha)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Compare against last built marker
        id: compare
        run: |
          last=$(cat epnd-last-built.txt 2>/dev/null || echo "")
          if [ "$last" = "${{ steps.latest.outputs.sha }}" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout epn-daemon source (private, read-only token)
        uses: actions/checkout@v4
        with:
          repository: 50gramx/epn-daemon
          token: ${{ secrets.CI_READ_TOKEN }}
          ref: ${{ needs.check.outputs.sha }}
          path: epn-daemon

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Configure git for private Go deps
        run: git config --global url."https://${{ secrets.CI_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Gate — vet must pass before we publish a public binary
        env:
          GOPRIVATE: 'github.com/50gramx/*,epn.io/*'
        working-directory: epn-daemon
        run: go vet ./...

      - name: Build matrix (pure Go, cross-compiled)
        env:
          CGO_ENABLED: '0'
          GOPRIVATE: 'github.com/50gramx/*,epn.io/*'
        working-directory: epn-daemon
        run: |
          set -euo pipefail
          mkdir -p dist
          build() {
            local goos="$1" goarch="$2" out="$3"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath \
              -ldflags "-s -w -X epn.io/daemon/internal/cmd.Version=${{ needs.check.outputs.sha }}" \
              -o "dist/$out" ./cmd/epnd
          }
          build windows amd64 epnd-windows-amd64.exe
          build linux   amd64 epnd-linux-amd64
          build linux   arm64 epnd-linux-arm64
          build darwin  amd64 epnd-darwin-amd64
          build darwin  arm64 epnd-darwin-arm64

      # Android runs the daemon in lite mode only (identity + wallet + p2p +
      # concierge, no k3s — enforced daemon-side: config auto-sets Lite on
      # GOOS=android). It ships INSIDE the APK as a jniLibs .so and is exec'd
      # from nativeLibraryDir, so it must be a real Android PIE binary — that
      # needs CGO + the NDK toolchain (a pure CGO_ENABLED=0 GOOS=android build
      # fails linking libp2p's wlynxg/anet netlink helper).
      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          # MUST be false: local-cache round-trips the NDK through tar, which
          # breaks the `clang` symlink (clang → clang-17), so the per-ABI
          # wrapper scripts fail with "clang: No such file or directory". A
          # fresh download keeps symlinks intact.
          local-cache: false

      - name: Build Android (NDK, CGO) — all shipped ABIs
        env:
          GOPRIVATE: 'github.com/50gramx/*,epn.io/*'
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        working-directory: epn-daemon
        run: |
          set -euo pipefail
          SHA="${{ needs.check.outputs.sha }}"
          TC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          API=21   # Android 5.0 floor — binary built at API 21 runs on 21+.
          abuild() {
            local abi="$1" goarch="$2" cc="$3" goarm="${4:-}"
            echo "→ android/$abi ($goarch)"
            # Fail loudly (with the bin listing) if the NDK toolchain isn't where
            # we expect, instead of a cryptic 127 from go's cgo child.
            if [ ! -x "$TC/$cc" ]; then
              echo "::error::NDK compiler missing: $TC/$cc"
              echo "toolchain bin contents:"; ls -la "$TC" | head -40
              exit 1
            fi
            # Export in a subshell rather than an inline `VAR=v … \` prefix: the
            # multiline-backslash prefix form was being mis-parsed by bash (it
            # tried to exec `CC=<path>` as a command, hence the 127).
            # -checklinkname=0: Go 1.23+ rejects //go:linkname to unexported
            # stdlib symbols by default, but go-libp2p's Android interface-
            # enumeration dep (wlynxg/anet) links to net.zoneCache on purpose.
            # This is the standard, go-libp2p-recommended escape hatch and only
            # applies to the Android CGO build (desktop is pure-Go, no anet).
            ( export CGO_ENABLED=1 GOOS=android GOARCH="$goarch" CC="$TC/$cc"
              [ -n "$goarm" ] && export GOARM="$goarm"
              go build -trimpath \
                -ldflags "-s -w -checklinkname=0 -X epn.io/daemon/internal/cmd.Version=$SHA" \
                -o "dist/epnd-android-$abi" ./cmd/epnd )
          }
          abuild arm64-v8a   arm64 aarch64-linux-android${API}-clang
          abuild armeabi-v7a arm   armv7a-linux-androideabi${API}-clang 7
          abuild x86_64      amd64 x86_64-linux-android${API}-clang
          ls -la dist/epnd-android-*

      - name: Stage installer + checksums
        run: |
          set -euo pipefail
          # Source of truth for install/update scripts is THIS repo's scripts/
          # dir (public, reviewable) — not epn-daemon's private copies, which
          # drift silently since nothing ever diffs them against what's on the
          # public site's "run a node" command.
          cp scripts/install.sh epn-daemon/dist/install.sh
          cp scripts/install.ps1 epn-daemon/dist/install.ps1
          cp scripts/epnd-autoupdate.sh epn-daemon/dist/epnd-autoupdate.sh
          cp scripts/epnd-autoupdate.ps1 epn-daemon/dist/epnd-autoupdate.ps1
          # Status reporter stays sourced from epn-daemon — it's founder-node-only
          # (needs a provisioned root PAT) and hasn't diverged from this repo.
          cp epn-daemon/scripts/report-bootstrap-status.sh epn-daemon/dist/report-bootstrap-status.sh
          cd epn-daemon/dist
          sha256sum epnd-* > checksums.txt

      - name: Publish (rolling epnd-latest)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: epnd-latest
          name: epnd — Latest Build (Rolling)
          body_path: epn-daemon/scripts/release-notes.md
          files: |
            epn-daemon/dist/epnd-windows-amd64.exe
            epn-daemon/dist/epnd-linux-amd64
            epn-daemon/dist/epnd-linux-arm64
            epn-daemon/dist/epnd-darwin-amd64
            epn-daemon/dist/epnd-darwin-arm64
            epn-daemon/dist/epnd-android-arm64-v8a
            epn-daemon/dist/epnd-android-armeabi-v7a
            epn-daemon/dist/epnd-android-x86_64
            epn-daemon/dist/install.sh
            epn-daemon/dist/install.ps1
            epn-daemon/dist/report-bootstrap-status.sh
            epn-daemon/dist/epnd-autoupdate.sh
            epn-daemon/dist/epnd-autoupdate.ps1
            epn-daemon/dist/checksums.txt

      - name: Update built-marker
        run: echo "${{ needs.check.outputs.sha }}" > epnd-last-built.txt

      - name: Commit marker
        # eapp-releases main is pushed by several scheduled workflows on
        # overlapping crons, so a bare push races ("fetch first" rejection).
        # Re-sync to origin, re-write the marker, retry; give up gracefully —
        # the release already published, and the next run catches up. Mirrors
        # aggregate-founders.yml's conflict-free pattern.
        run: |
          git config user.name "eutopia-ci"
          git config user.email "ci@50gramx.com"
          for i in $(seq 1 6); do
            git fetch -q origin main
            git reset -q --hard origin/main
            echo "${{ needs.check.outputs.sha }}" > epnd-last-built.txt
            if git diff --quiet -- epnd-last-built.txt; then
              echo "marker already current"; exit 0
            fi
            git add epnd-last-built.txt
            git commit -q -m "ci: built epnd @ ${{ needs.check.outputs.sha }}"
            if git push -q origin HEAD:main; then
              echo "pushed"; exit 0
            fi
            echo "push raced (attempt $i) — re-syncing"; sleep $((RANDOM % 4 + 2))
          done
          echo "gave up after retries — next run will catch up (not a failure)"; exit 0

      - name: Refresh bundled-epnd app builds for every already-released brand
        # epnd just changed — rebuild every brand/platform/channel combo that
        # has shipped before (per data/catalog.json), so the *initial* epnd
        # bundled into each app installer stays current too. (Already-installed
        # apps don't need this — they self-update epnd at runtime via
        # DaemonUpdater — this is purely about new installs getting the latest
        # daemon out of the box.) Runs only after the publish step above
        # succeeds, so there's no race against an incomplete epnd-latest.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          node -e '
            const fs = require("fs");
            const catalog = JSON.parse(fs.readFileSync("data/catalog.json", "utf8"));
            const combos = [];
            for (const product of catalog.products || []) {
              for (const r of product.releases || []) {
                combos.push({ brandId: product.brandId, platform: r.platform, channel: r.channel });
              }
            }
            fs.writeFileSync("/tmp/combos.json", JSON.stringify(combos));
          '
          node -e 'process.stdout.write(JSON.parse(require("fs").readFileSync("/tmp/combos.json")).map(c=>`${c.brandId} ${c.platform} ${c.channel}`).join("\n"))' > /tmp/combos.txt
          while read -r brand platform channel; do
            [ -z "$brand" ] && continue
            case "$platform" in
              linux)   wf="build-eapp-linux.yml" ;;
              windows) wf="build-eapp-windows.yml" ;;
              macos)   wf="build-eapp-macos.yml" ;;
              android) wf="build-eapp-android.yml" ;;
              *) echo "skip unknown platform: $platform"; continue ;;
            esac
            echo "→ $wf brand_id=$brand channel=$channel (refreshing bundled epnd)"
            gh workflow run "$wf" -f brand_id="$brand" -f release_channel="$channel"
          done < /tmp/combos.txt
