name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Data commits from aggregate-founders / catalog run under GITHUB_TOKEN, which
  # by design does NOT trigger `push` workflows — so Pages would never redeploy
  # with fresh network/bests/founders data. Redeploy when those finish, plus a
  # periodic fallback so the live site always catches up.
  workflow_run:
    workflows: ["Aggregate founder nodes", "Generate Release Catalog", "Build epnd (free public CI)"]
    types: [completed]
  schedule:
    - cron: '12,27,42,57 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Static Site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
