name: Generate Release Catalog

on:
  workflow_dispatch:
  repository_dispatch:
    types: [release-metadata-updated]
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Releases Repo
        uses: actions/checkout@v4

      - name: Checkout Interaction Contracts
        uses: actions/checkout@v4
        with:
          repository: 50gramx/eapp-interaction-contracts
          token: ${{ secrets.PROTOBUF_TOKEN || github.token }}
          path: .ci/eapp-interaction-contracts

      - name: Generate Catalog
        run: |
          node tools/generate-catalog.mjs \
            --contracts-root .ci/eapp-interaction-contracts \
            --metadata-root data/releases \
            --github-releases-repo ${{ github.repository }} \
            --github-token ${{ github.token }} \
            --output data/catalog.json

      - name: Commit Catalog
        run: |
          if git diff --quiet -- data/catalog.json; then
            echo "Catalog is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json
          git commit -m "Update release catalog"
          git push
