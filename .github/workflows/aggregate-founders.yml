name: Aggregate founder nodes

# Builds data/founders.json from data/nodes/*.json. founders.json is a fully
# derived artifact, so the commit step syncs to origin and REGENERATES before
# each push attempt — this makes concurrent runs conflict-free (no rebase of a
# stale generated file, which was the old failure mode).
on:
  schedule:
    - cron: '9,24,39,54 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['data/nodes/**']

permissions:
  contents: write

concurrency:
  group: aggregate-founders
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate + push (retry, conflict-free)
        run: |
          git config user.name "eutopia-ci"
          git config user.email "ci@50gramx.com"
          for i in $(seq 1 6); do
            git fetch -q origin main
            git reset -q --hard origin/main
            node tools/aggregate-founders.mjs
            # Stage first, then ask whether anything changed. data/communities.json
            # did not exist in the tree, and `git diff` on an untracked path reports
            # no difference — so the old guard exited "no change" and the file the
            # aggregator had just written was thrown away on every run, for as long
            # as buildCommunities() has existed. --cached sees adds as well as edits.
            git add data/founders.json data/network.json data/bests.json data/mesh.json data/communities.json
            if git diff --cached --quiet; then
              echo "no change"; exit 0
            fi
            git commit -q -m "ci: aggregate founder nodes + network/bests/communities proof"
            if git push -q origin HEAD:main; then
              echo "pushed"; exit 0
            fi
            echo "push raced (attempt $i) — re-syncing"; sleep $((RANDOM % 4 + 2))
          done
          echo "gave up after retries — next run will catch up (not a failure)"; exit 0
